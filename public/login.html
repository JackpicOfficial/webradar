<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebRadar Plus — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080810; --surface: #0f0f1e; --card: #141428;
      --border: #1e1e40; --accent: #00d4ff; --accent2: #7c3aed;
      --text: #e2e8f0; --muted: #8892b0; --error: #ef4444; --success: #10b981;
      --radius: 10px; --mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-wrap { width: 100%; max-width: 400px; padding: 24px; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo svg { color: var(--accent); margin-bottom: 12px; }
    .login-logo h1 { font-size: 22px; font-weight: 700; color: var(--accent); }
    .login-logo p { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 32px; }
    .login-card h2 { font-size: 16px; font-weight: 600; margin-bottom: 24px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .field input[type="text"], .field input[type="password"] {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-family: var(--mono);
      font-size: 13px; padding: 10px 12px; transition: border-color .2s; }
    .field input:focus { outline: none; border-color: var(--accent); }
    .remember-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; cursor: pointer; }
    .remember-row input[type="checkbox"] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
    .remember-row span { font-size: 12px; color: var(--muted); user-select: none; }
    .remember-hint { font-size: 11px; color: var(--muted); opacity: .6; margin-bottom: 12px; padding-left: 22px; }
    .btn-login { width: 100%; background: var(--accent); color: var(--bg);
      border: none; border-radius: var(--radius); font-weight: 700; font-size: 14px;
      padding: 12px; cursor: pointer; transition: opacity .2s; margin-top: 8px; }
    .btn-login:hover { opacity: .88; }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }
    .msg { font-size: 12px; padding: 10px 14px; border-radius: var(--radius); margin-top: 14px; text-align: center; }
    .msg.error { background: color-mix(in srgb, var(--error) 15%, var(--card)); color: var(--error); border: 1px solid var(--error); }
    .msg.info  { background: color-mix(in srgb, var(--accent) 10%, var(--card)); color: var(--accent); border: 1px solid var(--border); }
    .footer { text-align: center; font-size: 11px; color: var(--muted); margin-top: 20px; }
    .footer a { color: var(--accent); text-decoration: none; opacity: 0.7; }
    .footer a:hover { opacity: 1; }
    #step-2fa { display: none; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <svg width="40" height="40" viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="14" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
      <circle cx="16" cy="16" r="9"  stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
      <circle cx="16" cy="16" r="4"  fill="currentColor"/>
      <line x1="16" y1="2"  x2="16" y2="6"  stroke="currentColor" stroke-width="1.5"/>
      <line x1="16" y1="26" x2="16" y2="30" stroke="currentColor" stroke-width="1.5"/>
      <line x1="2"  y1="16" x2="6"  y2="16" stroke="currentColor" stroke-width="1.5"/>
      <line x1="26" y1="16" x2="30" y2="16" stroke="currentColor" stroke-width="1.5"/>
    </svg>
    <h1>WebRadar Plus</h1>
    <p>Network Intelligence — v1.1.3</p>
  </div>
  <div class="login-card">
    <div id="step-password">
      <h2>Sign In</h2>
      <div class="field"><label>Username</label><input type="text" id="username" autocomplete="username" /></div>
      <div class="field"><label>Password</label><input type="password" id="password" autocomplete="current-password" /></div>
      <label class="remember-row">
        <input type="checkbox" id="remember-me" />
        <span>Remember me for 1 day</span>
      </label>
      <p class="remember-hint">Without this, session expires after 8 hours.</p>
      <button class="btn-login" id="btn-login" onclick="doLogin()">Sign In</button>
    </div>
    <div id="step-2fa">
      <h2>Two-Factor Authentication</h2>
      <p style="font-size:13px;color:var(--muted);margin-bottom:20px">Enter the 6-digit code from your authenticator app.</p>
      <div class="field"><label>TOTP Code</label><input type="text" id="totp" maxlength="6" inputmode="numeric" autocomplete="one-time-code" /></div>
      <button class="btn-login" id="btn-2fa" onclick="do2FA()">Verify</button>
      <button onclick="backToLogin()" style="width:100%;margin-top:8px;background:none;border:1px solid var(--border);color:var(--muted);border-radius:var(--radius);padding:10px;cursor:pointer;font-size:13px">← Back</button>
    </div>
    <div id="login-msg"></div>
  </div>
  <div class="footer">Powered &amp; Built by <strong>JackpicOfficial</strong> &nbsp;·&nbsp; <a href="https://github.com/JackpicOfficial" target="_blank" rel="noopener">⭐ GitHub</a> &nbsp;·&nbsp; <a href="https://hub.docker.com/r/21degree/webradar-plus" target="_blank" rel="noopener">🐳 Docker Hub</a></div>
</div>
<script>
function showMsg(text, type) {
  const el = document.getElementById('login-msg');
  el.className = 'msg ' + type;
  el.textContent = text;
}
function clearMsg() { const el = document.getElementById('login-msg'); el.className = ''; el.textContent = ''; }

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const twoFaVisible = document.getElementById('step-2fa').offsetParent !== null;
    if (twoFaVisible) do2FA(); else doLogin();
  }
});

async function doLogin() {
  clearMsg();
  const username   = document.getElementById('username').value.trim();
  const password   = document.getElementById('password').value;
  const rememberMe = document.getElementById('remember-me').checked;
  if (!username || !password) return showMsg('Please enter username and password', 'error');
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, rememberMe }),
    });
    const data = await r.json();
    if (data.require2fa) {
      document.getElementById('step-password').style.display = 'none';
      document.getElementById('step-2fa').style.display = 'block';
      showMsg('Enter your authenticator code', 'info');
      document.getElementById('totp').focus();
    } else if (data.ok) {
      showMsg('Welcome back!', 'info');
      window.location.href = '/';
    } else {
      showMsg(data.error || 'Login failed', 'error');
    }
  } catch { showMsg('Network error', 'error'); }
  btn.disabled = false; btn.textContent = 'Sign In';
}

async function do2FA() {
  clearMsg();
  const totp       = document.getElementById('totp').value.trim();
  const username   = document.getElementById('username').value.trim();
  const password   = document.getElementById('password').value;
  const rememberMe = document.getElementById('remember-me').checked;
  if (!totp) return showMsg('Enter the 6-digit code', 'error');
  const btn = document.getElementById('btn-2fa');
  btn.disabled = true; btn.textContent = 'Verifying…';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, totp, rememberMe }),
    });
    const data = await r.json();
    if (data.ok) { window.location.href = '/'; }
    else { showMsg(data.error || 'Invalid code', 'error'); }
  } catch { showMsg('Network error', 'error'); }
  btn.disabled = false; btn.textContent = 'Verify';
}

function backToLogin() {
  document.getElementById('step-password').style.display = 'block';
  document.getElementById('step-2fa').style.display = 'none';
  clearMsg();
}
</script>
</body>
</html>
